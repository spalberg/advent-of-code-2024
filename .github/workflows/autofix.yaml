name: autofix.ci

on:
  push:
    branches: [main]
  pull_request: {}
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: denoland/setup-deno@v2
      - run: deno fmt
      - run: deno lint --fix --quiet
        continue-on-error: true
      - uses: autofix-ci/action@v1
